name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:   # Manuell auslösbar über GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Python 3.12 einrichten
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Java JDK 21 einrichten
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '21'

      - name: Flutter einrichten
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.24.0'
          channel: 'stable'
          cache: true

      - name: Python-Abhängigkeiten installieren
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install flet-cli

      - name: Flutter Analytics deaktivieren
        run: flutter config --no-analytics

      - name: APK bauen
        run: |
          flet build apk \
            --project SprachTrainer \
            --product "KI Sprachtrainer" \
            --org com.feist \
            --bundle-id com.feist.sprachtrainer \
            --build-version 1.0.${{ github.run_number }} \
            --build-number ${{ github.run_number }} \
            --splash-color "#1a1a2e" \
            --splash-dark-color "#0f0f1a" \
            --android-permissions INTERNET=True \
            --verbose

      - name: APK als Artefakt hochladen
        uses: actions/upload-artifact@v4
        with:
          name: SprachTrainer-APK-${{ github.run_number }}
          path: build/apk/app-release.apk
          retention-days: 30

      - name: GitHub Release erstellen
        uses: ncipollo/release-action@v1
        with:
          artifacts: "build/apk/app-release.apk"
          tag: v1.0.${{ github.run_number }}
          name: "SprachTrainer v1.0.${{ github.run_number }}"
          body: "Automatisch gebaute APK. Einfach herunterladen und auf Android installieren."
          token: ${{ secrets.GITHUB_TOKEN }}
